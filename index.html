<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>캐치마인드 - 이모지 20선 & 커스텀</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Malgun Gothic', sans-serif; }
        body { background-color: #eef2f5; color: #333; min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 10px; }

        /* 로비 화면 */
        #lobbyContainer {
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 420px;
            text-align: center;
            border: 3px solid #4a90e2;
        }
        #lobbyContainer h1 { font-size: 24px; color: #2c3e50; margin-bottom: 5px; }
        #lobbyContainer p { color: #7f8c8d; font-size: 13px; margin-bottom: 15px; }
        
        .input-group { margin-bottom: 12px; text-align: left; }
        .input-group label { display: block; font-size: 12px; font-weight: bold; color: #34495e; margin-bottom: 4px; }
        .input-group input { width: 100%; padding: 8px 10px; border: 2px solid #bdc3c7; border-radius: 6px; font-size: 14px; outline: none; }
        .input-group input:focus { border-color: #4a90e2; }

        /* 20가지 이모지 선택 팔레트 */
        .emoji-picker-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px; max-height: 130px; overflow-y: auto; background: #f8f9fa; padding: 6px; border: 2px solid #bdc3c7; border-radius: 6px; margin-bottom: 8px; }
        .emoji-option { font-size: 22px; padding: 4px; cursor: pointer; border: 2px solid transparent; border-radius: 4px; text-align: center; background: white; transition: transform 0.1s; }
        .emoji-option:hover { transform: scale(1.15); background: #eef2f5; }
        .emoji-option.selected { border-color: #e74c3c; background: #fadbd8; }

        .room-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; margin-bottom: 10px; }
        .room-btn { padding: 8px 2px; background: #ecf0f1; border: 2px solid #bdc3c7; border-radius: 6px; font-weight: bold; cursor: pointer; color: #2c3e50; font-size: 12px; }
        .room-btn:hover { background: #dcdde1; }
        .room-btn.active { background: #4a90e2; color: white; border-color: #357abd; }

        .custom-room-box { display: flex; gap: 6px; margin-bottom: 15px; }
        .custom-room-box input { flex-grow: 1; padding: 8px; border: 2px solid #bdc3c7; border-radius: 6px; }
        
        .btn-enter { width: 100%; padding: 12px; background: #2ecc71; color: white; border: none; border-radius: 6px; font-size: 16px; font-weight: bold; cursor: pointer; box-shadow: 0 3px #27ae60; }
        .btn-enter:active { transform: translateY(2px); box-shadow: 0 1px #27ae60; }

        /* 게임 메인 화면 */
        .game-container { display: none; width: 1100px; max-width: 100%; background: #d7effb; border: 4px solid #2980b9; border-radius: 8px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); gap: 8px; padding: 8px; flex-direction: row; }
        
        .side-profiles { width: 160px; display: flex; flex-direction: column; gap: 6px; justify-content: space-between; }
        .profile-card { background: white; border: 2px solid #2980b9; border-radius: 6px; padding: 6px; text-align: center; height: 23%; display: flex; flex-direction: column; justify-content: center; position: relative; }
        .profile-card.active-drawer { border-color: #e74c3c; background: #f9ebea; box-shadow: 0 0 6px rgba(231, 76, 60, 0.5); }
        .profile-avatar { font-size: 22px; margin-bottom: 2px; }
        .profile-name { font-size: 11px; font-weight: bold; color: #2c3e50; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .profile-score { font-size: 11px; color: #e67e22; font-weight: bold; }

        .center-pane { display: flex; flex-direction: column; width: 520px; gap: 6px; flex-grow: 1; }
        .top-info-bar { display: flex; justify-content: space-between; align-items: center; background: #fff; padding: 6px 10px; border: 2px solid #2980b9; border-radius: 6px; font-weight: bold; }
        .word-quiz-box { font-size: 16px; color: #c0392b; letter-spacing: 1px; }
        .timer-box { font-size: 14px; color: #e67e22; background: #fef5e7; padding: 2px 8px; border-radius: 12px; border: 1px solid #f39c12; }

        .canvas-wrap { position: relative; background: white; border: 3px solid #2980b9; border-radius: 6px; overflow: hidden; width: 100%; aspect-ratio: 4 / 3; }
        canvas { display: block; width: 100%; height: 100%; cursor: crosshair; background: #fff; touch-action: none; }

        .palette-bar { display: flex; align-items: center; background: #fff; padding: 6px 8px; border: 2px solid #2980b9; border-radius: 6px; justify-content: space-between; }
        .colors { display: flex; gap: 4px; }
        .c-btn { width: 20px; height: 20px; border-radius: 3px; cursor: pointer; border: 1px solid #7f8c8d; }
        .tools-group { display: flex; gap: 5px; }
        .t-btn { padding: 4px 8px; font-size: 11px; font-weight: bold; background: #ecf0f1; border: 1px solid #bdc3c7; border-radius: 4px; cursor: pointer; }
        .t-btn:hover { background: #bdc3c7; }

        .right-pane { display: flex; flex-direction: column; width: 220px; gap: 6px; }
        .action-panel { display: flex; gap: 5px; }
        .btn-game-start { flex-grow: 1; padding: 8px; background: #e74c3c; color: white; border: none; border-radius: 6px; font-weight: bold; font-size: 13px; cursor: pointer; box-shadow: 0 2px #c0392b; }
        .btn-game-start:active { transform: translateY(1px); box-shadow: none; }

        .chat-container { display: flex; flex-direction: column; flex-grow: 1; background: #fff; border: 2px solid #2980b9; border-radius: 6px; overflow: hidden; height: 150px; }
        .chat-messages { flex-grow: 1; overflow-y: auto; padding: 6px; font-size: 11px; display: flex; flex-direction: column; gap: 4px; background: #fdfefe; }
        .chat-input-row { display: flex; border-top: 2px solid #2980b9; }
        .chat-input-row input { flex-grow: 1; padding: 6px; border: none; outline: none; font-size: 12px; }
        .chat-input-row button { padding: 0 10px; background: #3498db; color: white; border: none; font-weight: bold; cursor: pointer; font-size: 11px; }
        .chat-input-row button:hover { background: #2980b9; }

        .m-sys { color: #c0392b; font-weight: bold; background: #fadbd8; padding: 2px 4px; border-radius: 3px; }
        .m-correct { color: #27ae60; font-weight: bold; background: #d4efdf; padding: 3px 5px; border-radius: 3px; border-left: 3px solid #27ae60; }
        .m-chat { color: #2c3e50; background: #f2f4f4; padding: 2px 4px; border-radius: 3px; }
        .m-chat span { color: #2980b9; font-weight: bold; }

        @media (max-width: 900px) {
            body { align-items: flex-start; padding: 5px; overflow-y: auto; height: auto; }
            .game-container { flex-direction: column; width: 100%; height: auto; align-items: center; }
            .side-profiles { width: 100%; flex-direction: row; flex-wrap: wrap; justify-content: center; gap: 4px; }
            .profile-card { width: 23%; height: 60px; }
            .center-pane { width: 100%; }
            .right-pane { width: 100%; }
            .chat-container { height: 140px; }
        }
    </style>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
</head>
<body>

    <!-- 로비 화면 -->
    <div id="lobbyContainer">
        <h1>캐치마인드</h1>
        <p>이모지 20선 선택 & 직접 입력 커스텀</p>
        
        <div class="input-group">
            <label>내 아바타 이모지 (선택 또는 직접 입력)</label>
            <div class="emoji-picker-grid" id="emojiGrid">
                <!-- 자바스크립트로 20가지 이모지 동적 생성 -->
            </div>
            <input type="text" id="avatarInput" value="😎" maxlength="2" style="text-align: center; font-size: 18px; margin-top: 4px;" placeholder="직접 입력 가능">
        </div>

        <div class="input-group">
            <label>닉네임</label>
            <input type="text" id="nicknameInput" placeholder="닉네임을 입력하세요" maxlength="8">
        </div>

        <div class="input-group">
            <label>방 선택 (실시간 인원)</label>
            <div class="room-grid">
                <button class="room-btn active" id="btn_1번방" onclick="selectRoom('1번방', this)">1번방(0)</button>
                <button class="room-btn" id="btn_2번방" onclick="selectRoom('2번방', this)">2번방(0)</button>
                <button class="room-btn" id="btn_3번방" onclick="selectRoom('3번방', this)">3번방(0)</button>
            </div>
        </div>

        <div class="custom-room-box">
            <input type="text" id="customRoomInput" placeholder="기타 방 번호">
            <button class="t-btn" onclick="joinCustomRoom()" style="background:#bdc3c7;">입장</button>
        </div>

        <button class="btn-enter" onclick="enterGame()">게임 입장</button>
    </div>

    <!-- 게임 메인 화면 -->
    <div class="game-container" id="gameArea">
        <div class="side-profiles" id="leftProfiles"></div>

        <div class="center-pane">
            <div class="top-info-bar">
                <div class="room-badge-txt" id="roomTitleTxt" style="color:#2980b9;">[1번방]</div>
                <div class="word-quiz-box" id="wordDisplay">대기 중...</div>
                <div class="timer-box" id="timerBadge">대기</div>
            </div>

            <div class="canvas-wrap">
                <canvas id="drawingBoard"></canvas>
            </div>

            <div class="palette-bar">
                <div class="colors">
                    <div class="c-btn" style="background:#000000;" onclick="setColor('#000000')"></div>
                    <div class="c-btn" style="background:#ffffff; border:1px solid #7f8c8d;" onclick="setColor('#ffffff')"></div>
                    <div class="c-btn" style="background:#e74c3c;" onclick="setColor('#e74c3c')"></div>
                    <div class="c-btn" style="background:#3498db;" onclick="setColor('#3498db')"></div>
                    <div class="c-btn" style="background:#2ecc71;" onclick="setColor('#2ecc71')"></div>
                    <div class="c-btn" style="background:#f1c40f;" onclick="setColor('#f1c40f')"></div>
                    <div class="c-btn" style="background:#9b59b6;" onclick="setColor('#9b59b6')"></div>
                    <div class="c-btn" style="background:#e67e22;" onclick="setColor('#e67e22')"></div>
                </div>
                <div class="tools-group">
                    <button class="t-btn" id="clearBtn">전체삭제</button>
                </div>
            </div>
        </div>

        <div class="right-pane">
            <div class="side-profiles" id="rightProfiles"></div>
            
            <div class="action-panel">
                <button class="btn-game-start" id="startBtn">게임 시작</button>
            </div>

            <div class="chat-container">
                <div class="chat-messages" id="chatBox"></div>
                <div class="chat-input-row">
                    <input type="text" id="chatInput" placeholder="정답 입력...">
                    <button id="sendBtn">전송</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const wordList = [
            "사과", "바나나", "호랑이", "컴퓨터", "스마트폰", "피자", "비행기", "우주선", "외계인", "경찰차",
            "소방관", "간호사", "의사", "학교", "선생님", "연필", "지우개", "가방", "안경", "시계",
            "자전거", "오토바이", "기차", "배", "구름", "태양", "달", "별", "무지개", "우산"
        ];

        // 20가지 다양한 이모지 리스트
        const emojiList = [
            "😎", "🐶", "🐱", "🦊", "🐼", "라이언", "🦄", "🐵", "로보", "👻", 
            "💩", "🤖", "👽", "💀", "🎃", "🍎", "🍕", "⚽", "🚗", "🔥"
        ].map(e => e.length > 2 ? "🐵" : e); // 예외 방지용 정제 (이모지 위주)

        // 실제 20선 이모지 배열 정의
        const niceEmojis = ["😎", "🐶", "🐱", "🦊", "🐼", "라이언", "🦄", "🐵", "로보", "👻", "💩", "🤖", "👽", "💀", "🎃", "🍎", "🍕", "⚽", "🚗", "🔥"];
        const cleanEmojis = ["😎", "🐶", "🐱", "🦊", "🐼", "라이언", "🦄", "🐵", "🐰", "👻", "💩", "🤖", "👽", "💀", "🎃", "🍎", "🍕", "⚽", "🚗", "🔥"];

        // 로비에 20개 이모지 버튼 동적 생성
        const emojiGrid = document.getElementById('emojiGrid');
        const avatarInput = document.getElementById('avatarInput');

        cleanEmojis.forEach((em, idx) => {
            let div = document.createElement('div');
            div.className = `emoji-option ${idx === 0 ? 'selected' : ''}`;
            div.textContent = em;
            div.onclick = () => {
                document.querySelectorAll('.emoji-option').forEach(el => el.classList.remove('selected'));
                div.classList.add('selected');
                avatarInput.value = em;
            };
            emojiGrid.appendChild(div);
        });

        const firebaseConfig = {
            apiKey: "AIzaSyBc51nfquy9i1FfCV0OZPdF0VBlX_ymVb0",
            authDomain: "catchmind-game-65e32.firebaseapp.com",
            projectId: "catchmind-game-65e32",
            storageBucket: "catchmind-game-65e32.firebasestorage.app",
            messagingSenderId: "813723811545",
            appId: "1:813723811545:web:0e467f03a5607702c6c8c8",
            databaseURL: "https://catchmind-game-65e32-default-rtdb.firebaseio.com"
        };
        
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let selectedRoom = "1번방";
        let myName = "";
        let myAvatar = "😎";
        let myScore = 0;
        let isMyTurn = false;
        let currentWord = "";
        let timerInterval = null;
        let drawColor = "#000000";

        const canvas = document.getElementById('drawingBoard');
        const ctx = canvas.getContext('2d');
        const chatBox = document.getElementById('chatBox');
        const chatInput = document.getElementById('chatInput');
        const wordDisplay = document.getElementById('wordDisplay');
        const timerBadge = document.getElementById('timerBadge');
        const leftProfiles = document.getElementById('leftProfiles');
        const rightProfiles = document.getElementById('rightProfiles');

        function resizeCanvas() {
            const rect = canvas.getBoundingClientRect();
            canvas.width = rect.width;
            canvas.height = rect.height;
            ctx.lineWidth = 4;
            ctx.lineCap = "round";
            ctx.lineJoin = "round";
            ctx.strokeStyle = drawColor;
        }
        window.addEventListener('resize', resizeCanvas);

        ['1번방', '2번방', '3번방'].forEach(r => {
            db.ref(`rooms/${r}/players`).on('value', snapshot => {
                let count = snapshot.numChildren();
                let btn = document.getElementById(`btn_${r}`);
                if(btn) btn.textContent = `${r}(${count})`;

                if(count === 0) {
                    db.ref(`rooms/${r}/gameSession`).set({ status: 'waiting' });
                    db.ref(`rooms/${r}/draw`).remove();
                }
            });
        });

        function selectRoom(rName, btn) {
            selectedRoom = rName;
            document.querySelectorAll('.room-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        }

        function joinCustomRoom() {
            let val = document.getElementById('customRoomInput').value.trim();
            if(val) {
                selectedRoom = val;
                enterGame();
            } else {
                alert("방 번호를 입력하세요!");
            }
        }

        function enterGame() {
            let n = document.getElementById('nicknameInput').value.trim();
            let customAvatar = avatarInput.value.trim();
            if(!n) {
                alert("닉네임을 입력해주세요!");
                return;
            }
            myName = n;
            if(customAvatar) myAvatar = customAvatar;

            document.getElementById('lobbyContainer').style.display = 'none';
            document.getElementById('gameArea').style.display = 'flex';
            document.getElementById('roomTitleTxt').textContent = `[${selectedRoom}]`;

            resizeCanvas();

            db.ref(`rooms/${selectedRoom}/players/${myName}`).set({ score: 0, avatar: myAvatar });
            
            db.ref(`rooms/${selectedRoom}/gameSession`).once('value', snapshot => {
                if(!snapshot.exists()) {
                    db.ref(`rooms/${selectedRoom}/gameSession`).set({ status: 'waiting' });
                }
            });

            initClassicEngine();
        }

        function setColor(c) {
            drawColor = c;
            ctx.strokeStyle = c;
        }

        function initClassicEngine() {
            let drawing = false;

            function getPos(e) {
                const rect = canvas.getBoundingClientRect();
                let clientX = e.clientX;
                let clientY = e.clientY;
                if(e.touches && e.touches.length > 0) {
                    clientX = e.touches[0].clientX;
                    clientY = e.touches[0].clientY;
                }
                return {
                    x: clientX - rect.left,
                    y: clientY - rect.top
                };
            }

            canvas.addEventListener('mousedown', (e) => {
                if(!isMyTurn) return;
                drawing = true;
                let pos = getPos(e);
                ctx.beginPath();
                ctx.moveTo(pos.x, pos.y);
            });
            canvas.addEventListener('mousemove', (e) => {
                if(!drawing || !isMyTurn) return;
                let pos = getPos(e);
                ctx.lineTo(pos.x, pos.y);
                ctx.stroke();
                db.ref(`rooms/${selectedRoom}/draw`).push({ x: pos.x / canvas.width, y: pos.y / canvas.height, color: drawColor, type: 'line' });
            });
            canvas.addEventListener('mouseup', () => {
                if(!isMyTurn) return;
                drawing = false;
                db.ref(`rooms/${selectedRoom}/draw`).push({ type: 'end' });
            });

            canvas.addEventListener('touchstart', (e) => {
                if(!isMyTurn) return;
                drawing = true;
                let pos = getPos(e);
                ctx.beginPath();
                ctx.moveTo(pos.x, pos.y);
                e.preventDefault();
            });
            canvas.addEventListener('touchmove', (e) => {
                if(!drawing || !isMyTurn) return;
                let pos = getPos(e);
                ctx.lineTo(pos.x, pos.y);
                ctx.stroke();
                db.ref(`rooms/${selectedRoom}/draw`).push({ x: pos.x / canvas.width, y: pos.y / canvas.height, color: drawColor, type: 'line' });
                e.preventDefault();
            });
            canvas.addEventListener('touchend', () => {
                if(!isMyTurn) return;
                drawing = false;
                db.ref(`rooms/${selectedRoom}/draw`).push({ type: 'end' });
            });

            document.getElementById('clearBtn').onclick = () => {
                if(!isMyTurn) return;
                ctx.clearRect(0,0,canvas.width,canvas.height);
                db.ref(`rooms/${selectedRoom}/draw`).push({ type: 'clear' });
            };

            db.ref(`rooms/${selectedRoom}/draw`).on('child_added', (snapshot) => {
                let data = snapshot.val();
                if(!data) return;
                if(data.type === 'line') {
                    ctx.strokeStyle = data.color || '#000';
                    let realX = data.x * canvas.width;
                    let realY = data.y * canvas.height;
                    ctx.lineTo(realX, realY);
                    ctx.stroke();
                } else if(data.type === 'end') {
                    ctx.beginPath();
                } else if(data.type === 'clear') {
                    ctx.clearRect(0,0,canvas.width,canvas.height);
                    ctx.beginPath();
                }
            });

            document.getElementById('startBtn').onclick = () => {
                db.ref(`rooms/${selectedRoom}/players`).once('value').then(snapshot => {
                    let pObj = snapshot.val();
                    if (!pObj) return;
                    let updates = {};
                    Object.keys(pObj).forEach(name => {
                        updates[`${name}/score`] = 0;
                    });
                    db.ref(`rooms/${selectedRoom}/players`).update(updates);

                    let pNames = Object.keys(pObj);
                    let firstDrawer = pNames[0];
                    let firstWord = wordList[Math.floor(Math.random() * wordList.length)];

                    db.ref(`rooms/${selectedRoom}/gameSession`).set({
                        round: 1, maxRound: 8, status: 'playing', drawer: firstDrawer, word: firstWord
                    });
                    db.ref(`rooms/${selectedRoom}/draw`).remove();
                    db.ref(`rooms/${selectedRoom}/chat`).push({ sender: '시스템', msg: '게임이 시작되었습니다! 총 8턴 진행!', type: 'sys' });
                });
            };

            document.getElementById('sendBtn').onclick = sendMsg;
            chatInput.onkeypress = (e) => { if(e.key === 'Enter') sendMsg(); };

            function sendMsg() {
                let text = chatInput.value.trim();
                if(!text) return;

                if(text === currentWord && !isMyTurn) {
                    db.ref(`rooms/${selectedRoom}/chat`).push({ sender: '시스템', msg: `정답입니다! [${myName}] 득점! (+10)`, type: 'correct' });
                    myScore += 10;
                    db.ref(`rooms/${selectedRoom}/players/${myName}`).update({ score: myScore });
                    nextTurn();
                } else {
                    db.ref(`rooms/${selectedRoom}/chat`).push({ sender: myName, msg: text, type: 'chat' });
                }
                chatInput.value = '';
            }

            db.ref(`rooms/${selectedRoom}/chat`).on('child_added', (snapshot) => {
                let d = snapshot.val();
                if(!d) return;
                let div = document.createElement('div');
                if(d.type === 'sys') {
                    div.className = 'm-sys'; div.textContent = `[공지] ${d.msg}`;
                } else if(d.type === 'correct') {
                    div.className = 'm-correct'; div.textContent = d.msg;
                } else {
                    div.className = 'm-chat'; div.innerHTML = `<span>${d.sender}:</span> ${d.msg}`;
                }
                chatBox.appendChild(div);
                chatBox.scrollTop = chatBox.scrollHeight;
            });

            function nextTurn() {
                db.ref(`rooms/${selectedRoom}/gameSession`).once('value').then(snapshot => {
                    let sess = snapshot.val();
                    if(!sess || sess.status !== 'playing') return;
                    let nRound = sess.round + 1;
                    
                    if(nRound > sess.maxRound) {
                        db.ref(`rooms/${selectedRoom}/gameSession`).update({ status: 'ended' });
                        db.ref(`rooms/${selectedRoom}/chat`).push({ sender: '시스템', msg: '🏆 8턴 게임 종료! 잠시 후 대기실로 돌아갑니다.', type: 'sys' });
                        
                        setTimeout(() => {
                            db.ref(`rooms/${selectedRoom}/gameSession`).set({ status: 'waiting' });
                            db.ref(`rooms/${selectedRoom}/draw`).remove();
                        }, 5000);
                        return;
                    }

                    db.ref(`rooms/${selectedRoom}/players`).once('value').then(pSnap => {
                        let pObj = pSnap.val();
                        if(!pObj) return;
                        let pNames = Object.keys(pObj);
                        let currentDrawer = sess.drawer;

                        let availableDrawers = pNames.filter(name => name !== currentDrawer);
                        if(availableDrawers.length === 0) availableDrawers = pNames;

                        let nDrawer = availableDrawers[Math.floor(Math.random() * availableDrawers.length)];
                        let nWord = wordList[Math.floor(Math.random() * wordList.length)];

                        db.ref(`rooms/${selectedRoom}/gameSession`).set({
                            round: nRound, maxRound: 8, status: 'playing', drawer: nDrawer, word: nWord
                        });
                        db.ref(`rooms/${selectedRoom}/draw`).remove();
                        db.ref(`rooms/${selectedRoom}/chat`).push({ sender: '시스템', msg: `[제 ${nRound}턴] 출제자: ${nDrawer}`, type: 'sys' });
                    });
                });
            }

            let currentDrawerGlobal = "";
            db.ref(`rooms/${selectedRoom}/gameSession`).on('value', (snapshot) => {
                let sess = snapshot.val();
                if(!sess) return;
                
                if(sess.status === 'waiting') {
                    wordDisplay.textContent = "대기 중...";
                    timerBadge.textContent = "대기";
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    isMyTurn = false;
                    if(timerInterval) clearInterval(timerInterval);
                    return;
                }
                if(sess.status === 'ended') {
                    wordDisplay.textContent = "게임 종료!";
                    timerBadge.textContent = "종료";
                    isMyTurn = false;
                    if(timerInterval) clearInterval(timerInterval);
                    return;
                }

                currentWord = sess.word;
                currentDrawerGlobal = sess.drawer;
                ctx.clearRect(0, 0, canvas.width, canvas.height);

                if(sess.drawer === myName) {
                    isMyTurn = true;
                    wordDisplay.textContent = `제시어: [ ${currentWord} ] (그리는 중)`;
                } else {
                    isMyTurn = false;
                    let bl = "⭐".repeat(currentWord.length);
                    wordDisplay.textContent = `제시어: ${bl} (출제자: ${sess.drawer})`;
                }

                if(timerInterval) clearInterval(timerInterval);
                let left = 30;
                timerBadge.textContent = `${left}초`;

                timerInterval = setInterval(() => {
                    left--;
                    timerBadge.textContent = `${left}초`;
                    if(left <= 0) {
                        clearInterval(timerInterval);
                        db.ref(`rooms/${selectedRoom}/players`).once('value').then(pSnap => {
                            let fPlayer = Object.keys(pSnap.val())[0];
                            if(myName === fPlayer) nextTurn();
                        });
                    }
                }, 1000);
            });

            db.ref(`rooms/${selectedRoom}/players`).on('value', (snapshot) => {
                leftProfiles.innerHTML = '';
                rightProfiles.innerHTML = '';
                let arr = [];
                snapshot.forEach(child => {
                    arr.push({ name: child.key, score: child.val().score, avatar: child.val().avatar || '😎' });
                });
                arr.sort((a,b) => b.score - a.score);

                for(let i = 0; i < 4; i++) {
                    leftProfiles.appendChild(createProfileCard(arr[i], currentDrawerGlobal));
                }
                for(let i = 4; i < 8; i++) {
                    rightProfiles.appendChild(createProfileCard(arr[i], currentDrawerGlobal));
                }
            });
        }

        function createProfileCard(pData, drawerName) {
            let card = document.createElement('div');
            card.className = 'profile-card';
            
            if(pData) {
                if(pData.name === drawerName) {
                    card.classList.add('active-drawer');
                }
                card.innerHTML = `
                    <div class="profile-avatar">${pData.avatar}</div>
                    <div class="profile-name">${pData.name}</div>
                    <div class="profile-score">${pData.score}점</div>
                `;
            } else {
                card.innerHTML = `
                    <div class="profile-avatar" style="opacity:0.2;">👤</div>
                    <div class="profile-name" style="color:#bdc3c7;">비어있음</div>
                    <div class="profile-score">-</div>
                `;
            }
            return card;
        }

        window.addEventListener('beforeunload', () => {
            if(myName && selectedRoom) {
                db.ref(`rooms/${selectedRoom}/players/${myName}`).remove();
            }
        });
    </script>
</body>
</html>
