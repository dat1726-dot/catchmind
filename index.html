<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>캐치마인드 - 완벽 마스터 에디션</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Malgun Gothic', sans-serif; }
        body { background-color: #eef2f5; color: #333; min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 10px; transition: background 0.3s; }
        body.flash-correct { background-color: #2ecc71 !important; }

        /* 로비 화면 */
        #lobbyContainer { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); width: 100%; max-width: 420px; text-align: center; border: 3px solid #4a90e2; position: relative; z-index: 10; }
        #lobbyContainer h1 { font-size: 24px; color: #2c3e50; margin-bottom: 5px; }
        #lobbyContainer p { color: #7f8c8d; font-size: 13px; margin-bottom: 15px; }
        
        .input-group { margin-bottom: 12px; text-align: left; }
        .input-group label { display: block; font-size: 12px; font-weight: bold; color: #34495e; margin-bottom: 4px; }
        .input-group input, .input-group select { width: 100%; padding: 8px 10px; border: 2px solid #bdc3c7; border-radius: 6px; font-size: 14px; outline: none; }
        .input-group input:focus, .input-group select:focus { border-color: #4a90e2; }

        .emoji-picker-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px; max-height: 110px; overflow-y: auto; background: #f8f9fa; padding: 6px; border: 2px solid #bdc3c7; border-radius: 6px; margin-bottom: 8px; }
        .emoji-option { font-size: 22px; padding: 4px; cursor: pointer; border: 2px solid transparent; border-radius: 4px; text-align: center; background: white; transition: transform 0.1s; }
        .emoji-option:hover { transform: scale(1.15); background: #eef2f5; }
        .emoji-option.selected { border-color: #e74c3c; background: #fadbd8; }

        .lobby-actions { display: flex; flex-direction: column; gap: 8px; margin-top: 15px; border-top: 2px dashed #bdc3c7; padding-top: 15px; }
        .btn-create { width: 100%; padding: 12px; background: #e74c3c; color: white; border: none; border-radius: 6px; font-size: 15px; font-weight: bold; cursor: pointer; box-shadow: 0 3px #c0392b; }
        .btn-join { width: 100%; padding: 12px; background: #3498db; color: white; border: none; border-radius: 6px; font-size: 15px; font-weight: bold; cursor: pointer; box-shadow: 0 3px #2980b9; }
        .btn-create:active, .btn-join:active { transform: translateY(2px); box-shadow: 0 1px; }

        /* 게임 메인 화면 */
        .game-container { display: none; width: 1150px; max-width: 100%; background: #d7effb; border: 4px solid #2980b9; border-radius: 8px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); gap: 8px; padding: 8px; flex-direction: row; position: relative; }
        
        .side-profiles { width: 160px; display: flex; flex-direction: column; gap: 6px; justify-content: space-between; }
        .profile-card { background: white; border: 2px solid #2980b9; border-radius: 6px; padding: 6px; text-align: center; height: 23%; display: flex; flex-direction: column; justify-content: center; position: relative; }
        .profile-card.active-drawer { border-color: #e74c3c; background: #f9ebea; box-shadow: 0 0 6px rgba(231, 76, 60, 0.5); }
        .profile-card.spectator { opacity: 0.6; background: #eee; border-color: #999; }
        .profile-avatar { font-size: 22px; margin-bottom: 2px; }
        .profile-name { font-size: 11px; font-weight: bold; color: #2c3e50; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .profile-score { font-size: 11px; color: #e67e22; font-weight: bold; }
        
        .role-badge { position: absolute; top: 4px; right: 4px; font-size: 9px; padding: 2px 4px; border-radius: 4px; font-weight: bold; }
        .role-badge.host { background: #f1c40f; color: #d35400; }
        .role-badge.spec { background: #95a5a6; color: white; }
        
        .ready-badge { position: absolute; top: 4px; left: 4px; font-size: 9px; padding: 2px 4px; border-radius: 4px; font-weight: bold; }
        .ready-badge.on { background: #2ecc71; color: white; }
        .ready-badge.off { background: #e74c3c; color: white; }

        .center-pane { display: flex; flex-direction: column; width: 540px; gap: 6px; flex-grow: 1; }
        .top-info-bar { display: flex; justify-content: space-between; align-items: center; background: #fff; padding: 6px 10px; border: 2px solid #2980b9; border-radius: 6px; font-weight: bold; }
        .word-quiz-box { font-size: 18px; color: #c0392b; letter-spacing: 1px; flex-grow: 1; text-align: center; }
        .timer-box { font-size: 15px; color: #e67e22; background: #fef5e7; padding: 3px 10px; border-radius: 12px; border: 1px solid #f39c12; min-width: 60px; text-align: center; }

        .canvas-wrap { position: relative; background: white; border: 3px solid #2980b9; border-radius: 6px; overflow: hidden; width: 100%; aspect-ratio: 4 / 3; }
        canvas { display: block; width: 100%; height: 100%; cursor: crosshair; background: #fff; touch-action: none; }

        .palette-bar { display: flex; align-items: center; background: #fff; padding: 6px 8px; border: 2px solid #2980b9; border-radius: 6px; flex-wrap: wrap; gap: 8px; }
        .colors { display: flex; gap: 4px; }
        .c-btn { width: 22px; height: 22px; border-radius: 3px; cursor: pointer; border: 1px solid #7f8c8d; }
        .tools-group { display: flex; gap: 4px; flex-wrap: wrap; align-items: center; }
        .t-btn { padding: 4px 6px; font-size: 11px; font-weight: bold; background: #ecf0f1; border: 1px solid #bdc3c7; border-radius: 4px; cursor: pointer; }
        .t-btn:hover { background: #bdc3c7; }
        .t-btn.active-tool { background: #34495e; color: white; border-color: #2c3e50; }

        .right-pane { display: flex; flex-direction: column; width: 220px; gap: 6px; }
        .action-panel { display: flex; gap: 5px; flex-direction: column; }
        .btn-game-start { width: 100%; padding: 10px; background: #e74c3c; color: white; border: none; border-radius: 6px; font-weight: bold; font-size: 14px; cursor: pointer; box-shadow: 0 2px #c0392b; display: none; }
        .btn-game-ready { width: 100%; padding: 10px; background: #f39c12; color: white; border: none; border-radius: 6px; font-weight: bold; font-size: 14px; cursor: pointer; box-shadow: 0 2px #d68910; }
        .btn-game-ready.ready { background: #27ae60; box-shadow: 0 2px #1e8449; }
        .btn-game-start:active, .btn-game-ready:active { transform: translateY(1px); box-shadow: none; }

        .chat-container { display: flex; flex-direction: column; flex-grow: 1; background: #fff; border: 2px solid #2980b9; border-radius: 6px; overflow: hidden; height: 140px; }
        .chat-messages { flex-grow: 1; overflow-y: auto; padding: 6px; font-size: 11px; display: flex; flex-direction: column; gap: 4px; background: #fdfefe; }
        .chat-input-row { display: flex; border-top: 2px solid #2980b9; }
        .chat-input-row input { flex-grow: 1; padding: 6px; border: none; outline: none; font-size: 12px; }
        .chat-input-row button { padding: 0 10px; background: #3498db; color: white; border: none; font-weight: bold; cursor: pointer; font-size: 11px; }

        .m-sys { color: #c0392b; font-weight: bold; background: #fadbd8; padding: 2px 4px; border-radius: 3px; }
        .m-correct { color: #27ae60; font-weight: bold; background: #d4efdf; padding: 3px 5px; border-radius: 3px; border-left: 3px solid #27ae60; }
        .m-hint { color: #8e44ad; font-weight: bold; background: #f5eef8; padding: 3px 5px; border-radius: 3px; border-left: 3px solid #8e44ad; }
        .m-chat { color: #2c3e50; background: #f2f4f4; padding: 2px 4px; border-radius: 3px; }
        .m-chat span { color: #2980b9; font-weight: bold; }

        /* 시상식 포디움 오버레이 */
        #podiumModal { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 100; display: none; flex-direction: column; justify-content: center; align-items: center; color: white; border-radius: 8px; }
        #podiumModal h2 { font-size: 32px; color: #f1c40f; margin-bottom: 20px; text-shadow: 0 0 10px #f39c12; }
        .podium-container { display: flex; align-items: flex-end; gap: 10px; height: 200px; }
        .podium-step { display: flex; flex-direction: column; align-items: center; width: 90px; }
        .podium-avatar { font-size: 40px; margin-bottom: 5px; }
        .podium-name { font-size: 14px; font-weight: bold; margin-bottom: 5px; text-align: center; }
        .podium-box { width: 100%; background: #3498db; display: flex; justify-content: center; padding-top: 10px; font-size: 20px; font-weight: bold; box-shadow: inset 0 0 15px rgba(0,0,0,0.3); border-radius: 8px 8px 0 0; }
        .podium-box.first { height: 120px; background: #f1c40f; color: #d35400; }
        .podium-box.second { height: 80px; background: #bdc3c7; color: #2c3e50; }
        .podium-box.third { height: 50px; background: #cd7f32; color: #fff; }

        @media (max-width: 900px) {
            body { align-items: flex-start; padding: 5px; overflow-y: auto; height: auto; }
            .game-container { flex-direction: column; width: 100%; height: auto; align-items: center; }
            .side-profiles { width: 100%; flex-direction: row; flex-wrap: wrap; justify-content: center; gap: 4px; }
            .profile-card { width: 23%; height: 65px; }
            .center-pane { width: 100%; }
            .right-pane { width: 100%; }
            .chat-container { height: 140px; }
        }
    </style>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
</head>
<body>

    <div id="lobbyContainer">
        <h1>캐치마인드 마스터</h1>
        <p>게임 특화 테마 & 준비 시스템</p>
        
        <div class="input-group">
            <div class="emoji-picker-grid" id="emojiGrid"></div>
            <input type="text" id="avatarInput" value="😎" maxlength="2" style="text-align: center; font-size: 16px; margin-top: 4px;" placeholder="이모지 직접입력">
        </div>

        <div class="input-group">
            <label>닉네임</label>
            <input type="text" id="nicknameInput" placeholder="닉네임을 입력하세요" maxlength="8">
        </div>

        <div class="input-group">
            <label>방 이름 (입력)</label>
            <input type="text" id="roomNameInput" placeholder="예: 무야호방" value="1번방">
        </div>

        <div class="lobby-actions">
            <div style="background:#fdfefe; padding:10px; border:1px solid #bdc3c7; border-radius:6px;">
                <label style="font-size:11px; color:#7f8c8d; margin-bottom:5px; display:block;">[방장으로 방 생성]</label>
                <select id="themeSelect" style="margin-bottom:8px;">
                    <option value="게임캐릭터">🎮 인기 게임 & 캐릭터</option>
                    <option value="인터넷밈">🔥 인터넷 밈 & 유행어</option>
                    <option value="영화드라마">🎬 영화 & 드라마 타이틀</option>
                    <option value="일반사물">🍎 기본 사물 & 직업</option>
                </select>
                <button class="btn-create" onclick="createRoom()">✨ 방 만들기</button>
            </div>
            
            <div style="background:#fdfefe; padding:10px; border:1px solid #bdc3c7; border-radius:6px;">
                <label style="font-size:11px; color:#7f8c8d; margin-bottom:5px; display:block;">[기존 방에 참여]</label>
                <button class="btn-join" onclick="joinRoom()">🚪 게임 참여하기</button>
            </div>
        </div>
    </div>

    <div class="game-container" id="gameArea">
        <div id="podiumModal">
            <h2>🎉 게임 종료! 🎉</h2>
            <div class="podium-container" id="podiumContainer"></div>
        </div>

        <div class="side-profiles" id="leftProfiles"></div>

        <div class="center-pane">
            <div class="top-info-bar">
                <div class="room-badge-txt" id="roomTitleTxt" style="color:#2980b9;">[1번방]</div>
                <div class="word-quiz-box" id="wordDisplay">대기 중...</div>
                <div class="timer-box" id="timerBadge">대기</div>
            </div>

            <div class="canvas-wrap">
                <canvas id="drawingBoard" width="800" height="600"></canvas>
            </div>

            <div class="palette-bar">
                <div class="colors">
                    <div class="c-btn" style="background:#000000;" onclick="setColor('#000000')"></div>
                    <div class="c-btn" style="background:#e74c3c;" onclick="setColor('#e74c3c')"></div>
                    <div class="c-btn" style="background:#3498db;" onclick="setColor('#3498db')"></div>
                    <div class="c-btn" style="background:#2ecc71;" onclick="setColor('#2ecc71')"></div>
                    <div class="c-btn" style="background:#f1c40f;" onclick="setColor('#f1c40f')"></div>
                    <div class="c-btn" style="background:#9b59b6;" onclick="setColor('#9b59b6')"></div>
                </div>
                <div class="tools-group">
                    <button class="t-btn active-tool" id="btnThin" onclick="setLineWidth(3, this)">🖌️얇게</button>
                    <button class="t-btn" id="btnThick" onclick="setLineWidth(12, this)">🖌️두껍게</button>
                    <button class="t-btn" id="btnEraser" onclick="setColor('#ffffff'); setLineWidth(30, this)">지우개</button>
                    <button class="t-btn" id="btnFill" onclick="fillCanvas()">🪣채우기</button>
                    <button class="t-btn" id="clearBtn">🗑️전체삭제</button>
                    <button class="t-btn" id="btnPass" onclick="passTurn()" style="background:#e74c3c; color:white; display:none;">⏭️패스</button>
                </div>
            </div>
        </div>

        <div class="right-pane">
            <div class="side-profiles" id="rightProfiles"></div>
            
            <div class="action-panel">
                <button class="btn-game-ready" id="readyBtn" onclick="toggleReady()">준비하기 (READY)</button>
                <button class="btn-game-start" id="startBtn" onclick="startGameHost()">게임 시작 (방장)</button>
            </div>

            <div class="chat-container">
                <div class="chat-messages" id="chatBox"></div>
                <div class="chat-input-row">
                    <input type="text" id="chatInput" placeholder="정답 입력...">
                    <button id="sendBtn">전송</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 진정한 게임 느낌의 테마별 단어장 리스트
        const themeWords = {
            "게임캐릭터": ["리그오브레전드", "배틀그라운드", "메이플스토리", "발로란트", "오버워치", "피카츄", "손오공", "마리오", "티모", "야스오", "포켓몬", "스타크래프트", "쿠키런", "원신", "테일즈런너"],
            "인터넷밈": ["무야호", "어쩔티비", "내면의분노", "오히려좋아", "중요한것은꺾이지않는마음", "억까", "알고보니", "영포티", "초딩", "민초단", "탕후루", "스레드", "챌린지", "숏폼", "알빠노"],
            "영화드라마": ["오징어게임", "어벤져스", "겨울왕국", "기생충", "파묘", "범죄도시", "스파이더맨", "타이타닉", "해리포터", "반지의제왕", "인터스텔라", "슬기로운의사생활", "더글로리", "무빙", "킹덤"],
            "일반사물": ["스마트폰", "컴퓨터", "노트북", "이어폰", "냉장고", "세탁기", "청소기", "전자레인지", "선풍기", "에어컨", "자동차", "비행기", "자전거", "소방관", "경찰관"]
        };

        const cleanEmojis = ["😎", "🐶", "🐱", "🦊", "🐼", "🐨", "🦄", "🐵", "🐰", "👻", "💩", "🤖", "👽", "💀", "🎃", "🍎", "🍕", "⚽", "🚗", "🔥"];
        const emojiGrid = document.getElementById('emojiGrid');
        const avatarInput = document.getElementById('avatarInput');

        cleanEmojis.forEach((em, idx) => {
            let div = document.createElement('div');
            div.className = `emoji-option ${idx === 0 ? 'selected' : ''}`;
            div.textContent = em;
            div.onclick = () => {
                document.querySelectorAll('.emoji-option').forEach(el => el.classList.remove('selected'));
                div.classList.add('selected');
                avatarInput.value = em;
            };
            emojiGrid.appendChild(div);
        });

        function getChosung(str) {
            const cho = ['ㄱ','ㄲ','ㄴ','ㄷ','ㄸ','ㄹ','ㅁ','ㅂ','ㅃ','ㅅ','ㅆ','ㅇ','ㅈ','ㅉ','ㅊ','ㅋ','ㅌ','ㅍ','ㅎ'];
            let result = '';
            for(let i=0; i<str.length; i++) {
                let code = str.charCodeAt(i) - 44032;
                if(code > -1 && code < 11172) result += cho[Math.floor(code / 588)];
                else result += str.charAt(i);
            }
            return result;
        }

        const AudioContext = window.AudioContext || window.webkitAudioContext;
        let audioCtx;
        function initAudio() {
            if(!audioCtx) audioCtx = new AudioContext();
            if(audioCtx.state === 'suspended') audioCtx.resume();
        }
        function playBeep(freq, time, duration, vol=0.1) {
            if(!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.frequency.value = freq;
            gain.gain.setValueAtTime(vol, audioCtx.currentTime + time);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + time + duration);
            osc.start(audioCtx.currentTime + time); osc.stop(audioCtx.currentTime + time + duration);
        }
        function playStartSound() { initAudio(); playBeep(440, 0, 0.1); playBeep(880, 0.1, 0.2); }
        function playCorrectSound() { initAudio(); playBeep(523.25, 0, 0.2); playBeep(659.25, 0.1, 0.2); playBeep(783.99, 0.2, 0.4); }

        const firebaseConfig = {
            apiKey: "AIzaSyBc51nfquy9i1FfCV0OZPdF0VBlX_ymVb0",
            authDomain: "catchmind-game-65e32.firebaseapp.com",
            projectId: "catchmind-game-65e32",
            storageBucket: "catchmind-game-65e32.firebasestorage.app",
            messagingSenderId: "813723811545",
            appId: "1:813723811545:web:0e467f03a5607702c6c8c8",
            databaseURL: "https://catchmind-game-65e32-default-rtdb.firebaseio.com"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let selectedRoom = "";
        let myName = "";
        let myAvatar = "";
        let isMyTurn = false;
        let isHost = false;
        let isReady = false;
        let isSpectator = false;
        let currentWord = "";
        let timerInterval = null;
        let drawColor = "#000000";
        let currentLineWidth = 3;

        const canvas = document.getElementById('drawingBoard');
        const ctx = canvas.getContext('2d');
        ctx.lineCap = "round";
        ctx.lineJoin = "round";

        const chatBox = document.getElementById('chatBox');
        const chatInput = document.getElementById('chatInput');
        const wordDisplay = document.getElementById('wordDisplay');
        const timerBadge = document.getElementById('timerBadge');
        const readyBtn = document.getElementById('readyBtn');

        function createRoom() {
            let rName = document.getElementById('roomNameInput').value.trim();
            let nName = document.getElementById('nicknameInput').value.trim();
            let theme = document.getElementById('themeSelect').value;
            
            if(!rName || !nName) { alert("방 이름과 닉네임을 모두 입력해주세요!"); return; }
            
            db.ref(`rooms/${rName}/settings`).once('value', snapshot => {
                if(snapshot.exists()) {
                    alert("이미 존재하는 방입니다. 다른 이름으로 만들거나 '참여하기'를 눌러주세요.");
                } else {
                    isHost = true;
                    db.ref(`rooms/${rName}/settings`).set({ host: nName, theme: theme });
                    db.ref(`rooms/${rName}/gameSession`).set({ status: 'waiting' });
                    joinProcess(rName, nName);
                }
            });
        }

        function joinRoom() {
            let rName = document.getElementById('roomNameInput').value.trim();
            let nName = document.getElementById('nicknameInput').value.trim();
            
            if(!rName || !nName) { alert("방 이름과 닉네임을 모두 입력해주세요!"); return; }

            db.ref(`rooms/${rName}/settings`).once('value', snapshot => {
                if(!snapshot.exists()) {
                    alert("존재하지 않는 방입니다. 방 이름을 확인하거나 새로 만들어주세요.");
                } else {
                    let hostName = snapshot.val().host;
                    isHost = (hostName === nName);
                    joinProcess(rName, nName);
                }
            });
        }

        function joinProcess(rName, nName) {
            initAudio();
            selectedRoom = rName;
            myName = nName;
            myAvatar = avatarInput.value.trim() || "😎";

            document.getElementById('lobbyContainer').style.display = 'none';
            document.getElementById('gameArea').style.display = 'flex';
            document.getElementById('roomTitleTxt').textContent = `[${selectedRoom}]`;
            
            if(isHost) {
                document.getElementById('startBtn').style.display = 'block';
                readyBtn.style.display = 'none'; // 방장은 준비 버튼 대신 시작 버튼 사용
            }

            db.ref(`rooms/${selectedRoom}/gameSession/status`).once('value', sSnap => {
                let status = sSnap.val();
                isSpectator = (status === 'playing');
                db.ref(`rooms/${selectedRoom}/players/${myName}`).set({ 
                    score: 0, avatar: myAvatar, role: isSpectator ? 'spectator' : 'player', host: isHost, ready: false 
                });
                if(isSpectator) {
                    db.ref(`rooms/${selectedRoom}/chat`).push({ sender: '시스템', msg: `👀 ${myName}님이 관전자로 입장했습니다. (다음 판부터 참여)`, type: 'sys' });
                } else {
                    db.ref(`rooms/${selectedRoom}/chat`).push({ sender: '시스템', msg: `👋 ${myName}님이 입장했습니다.`, type: 'sys' });
                }
            });

            db.ref(`rooms/${selectedRoom}/players`).on('value', pSnap => {
                if(pSnap.numChildren() === 0) {
                    db.ref(`rooms/${selectedRoom}`).remove();
                }
            });

            initEngine();
        }

        function toggleReady() {
            if(isHost) return;
            initAudio();
            isReady = !isReady;
            db.ref(`rooms/${selectedRoom}/players/${myName}`).update({ ready: isReady });
            
            if(isReady) {
                readyBtn.textContent = "준비 완료! (CANCEL)";
                readyBtn.classList.add('ready');
            } else {
                readyBtn.textContent = "준비하기 (READY)";
                readyBtn.classList.remove('ready');
            }
        }

        function startGameHost() {
            if(!isHost) return;
            db.ref(`rooms/${selectedRoom}/players`).once('value').then(snapshot => {
                let pObj = snapshot.val();
                if(!pObj) return;
                
                let pNames = Object.keys(pObj);
                let nonHosts = pNames.filter(n => !pObj[n].host);
                
                // 방장 제외 전원 준비 완료 검사 (혼자 테스트할 땐 방장만 있어도 시작 가능하게 예외 처리)
                let allReady = nonHosts.every(n => pObj[n].ready) || pNames.length === 1;
                if(!allReady) {
                    alert("아직 준비하지 않은 팀원이 있습니다!");
                    return;
                }

                let updates = {};
                pNames.forEach(name => {
                    updates[`${name}/score`] = 0;
                    updates[`${name}/role`] = 'player';
                    updates[`${name}/ready`] = false;
                });
                db.ref(`rooms/${selectedRoom}/players`).update(updates);
                isReady = false;

                db.ref(`rooms/${selectedRoom}/settings/theme`).once('value', tSnap => {
                    let theme = tSnap.val() || "게임캐릭터";
                    let wList = themeWords[theme] || themeWords["게임캐릭터"];
                    let firstWord = wList[Math.floor(Math.random() * wList.length)];
                    
                    db.ref(`rooms/${selectedRoom}/gameSession`).set({ 
                        round: 1, maxRound: 8, status: 'playing', drawer: pNames[0], word: firstWord, theme: theme 
                    });
                    db.ref(`rooms/${selectedRoom}/draw`).remove();
                    db.ref(`rooms/${selectedRoom}/chat`).push({ sender: '시스템', msg: `🚀 방장(${myName})이 게임을 시작했습니다! (테마: ${theme})`, type: 'sys' });
                    playStartSound();
                });
            });
        }

        function setColor(c) { drawColor = c; }
        function setLineWidth(w, btn) {
            currentLineWidth = w;
            document.querySelectorAll('#btnThin, #btnThick, #btnEraser').forEach(el => el.classList.remove('active-tool'));
            btn.classList.add('active-tool');
        }

        function fillCanvas() {
            if(!isMyTurn || isSpectator) return;
            ctx.fillStyle = drawColor;
            ctx.fillRect(0,0,canvas.width,canvas.height);
            db.ref(`rooms/${selectedRoom}/draw`).push({ type: 'fill', color: drawColor });
        }

        function passTurn() {
            if(!isMyTurn) return;
            db.ref(`rooms/${selectedRoom}/chat`).push({ sender: '시스템', msg: `⏭️ 출제자가 단어를 패스했습니다! (정답: ${currentWord})`, type: 'sys' });
            nextTurn();
        }

        function initEngine() {
            let drawing = false;

            function getPos(e) {
                const rect = canvas.getBoundingClientRect();
                let cX = e.clientX, cY = e.clientY;
                if(e.touches && e.touches.length > 0) { cX = e.touches[0].clientX; cY = e.touches[0].clientY; }
                let scaleX = canvas.width / rect.width;
                let scaleY = canvas.height / rect.height;
                return { x: (cX - rect.left) * scaleX, y: (cY - rect.top) * scaleY };
            }

            function startDraw(e) {
                if(!isMyTurn || isSpectator) return;
                drawing = true;
                let pos = getPos(e);
                ctx.lineWidth = currentLineWidth;
                ctx.strokeStyle = drawColor;
                ctx.beginPath();
                ctx.moveTo(pos.x, pos.y);
            }

            function moveDraw(e) {
                if(!drawing || !isMyTurn || isSpectator) return;
                let pos = getPos(e);
                ctx.lineTo(pos.x, pos.y);
                ctx.stroke();
                db.ref(`rooms/${selectedRoom}/draw`).push({ 
                    x: pos.x / canvas.width, y: pos.y / canvas.height, 
                    color: drawColor, width: currentLineWidth, type: 'line' 
                });
                if(e.type === 'touchmove') e.preventDefault();
            }

            function endDraw() {
                if(!isMyTurn || isSpectator) return;
                drawing = false;
                db.ref(`rooms/${selectedRoom}/draw`).push({ type: 'end' });
            }

            canvas.addEventListener('mousedown', startDraw);
            canvas.addEventListener('mousemove', moveDraw);
            canvas.addEventListener('mouseup', endDraw);
            canvas.addEventListener('touchstart', startDraw);
            canvas.addEventListener('touchmove', moveDraw, {passive: false});
            canvas.addEventListener('touchend', endDraw);

            document.getElementById('clearBtn').onclick = () => {
                if(!isMyTurn || isSpectator) return;
                ctx.clearRect(0,0,canvas.width,canvas.height);
                db.ref(`rooms/${selectedRoom}/draw`).push({ type: 'clear' });
            };

            db.ref(`rooms/${selectedRoom}/draw`).on('child_added', (snapshot) => {
                let data = snapshot.val();
                if(!data) return;
                if(data.type === 'line') {
                    ctx.strokeStyle = data.color;
                    ctx.lineWidth = data.width || 3;
                    ctx.lineTo(data.x * canvas.width, data.y * canvas.height);
                    ctx.stroke();
                } else if(data.type === 'fill') {
                    ctx.fillStyle = data.color;
                    ctx.fillRect(0,0,canvas.width,canvas.height);
                } else if(data.type === 'end') {
                    ctx.beginPath();
                } else if(data.type === 'clear') {
                    ctx.clearRect(0,0,canvas.width,canvas.height);
                    ctx.beginPath();
                }
            });

            document.getElementById('sendBtn').onclick = sendMsg;
            chatInput.onkeypress = (e) => { if(e.key === 'Enter') sendMsg(); };

            function sendMsg() {
                let text = chatInput.value.trim();
                if(!text) return;

                if(text === currentWord && !isMyTurn && !isSpectator) {
                    playCorrectSound();
                    document.body.classList.add('flash-correct');
                    setTimeout(() => document.body.classList.remove('flash-correct'), 400);

                    let leftTime = parseInt(timerBadge.textContent) || 0;
                    let guesserScore = 10 + leftTime;
                    
                    db.ref(`rooms/${selectedRoom}/chat`).push({ sender: '시스템', msg: `🎉 정답! [${myName}]님 +${guesserScore}점 획득! (남은시간: ${leftTime}초)`, type: 'correct' });
                    
                    db.ref(`rooms/${selectedRoom}/players/${myName}/score`).once('value').then(s => {
                        db.ref(`rooms/${selectedRoom}/players/${myName}`).update({ score: (s.val()||0) + guesserScore });
                    });
                    
                    let drawerName = currentDrawerGlobal;
                    if(drawerName) {
                        db.ref(`rooms/${selectedRoom}/players/${drawerName}/score`).once('value').then(ds => {
                            db.ref(`rooms/${selectedRoom}/players/${drawerName}`).update({ score: (ds.val()||0) + 5 });
                        });
                        db.ref(`rooms/${selectedRoom}/chat`).push({ sender: '시스템', msg: `🖌️ 그림을 잘 그린 출제자(${drawerName}) 보너스 +5점!`, type: 'hint' });
                    }
                    
                    nextTurn();
                } else {
                    db.ref(`rooms/${selectedRoom}/chat`).push({ sender: myName, msg: text, type: 'chat' });
                }
                chatInput.value = '';
            }

            db.ref(`rooms/${selectedRoom}/chat`).on('child_added', (snapshot) => {
                let d = snapshot.val();
                if(!d) return;
                let div = document.createElement('div');
                if(d.type === 'sys') { div.className = 'm-sys'; div.textContent = `[공지] ${d.msg}`; }
                else if(d.type === 'hint') { div.className = 'm-hint'; div.textContent = d.msg; }
                else if(d.type === 'correct') { div.className = 'm-correct'; div.textContent = d.msg; }
                else { div.className = 'm-chat'; div.innerHTML = `<span>${d.sender}:</span> ${d.msg}`; }
                chatBox.appendChild(div);
                chatBox.scrollTop = chatBox.scrollHeight;
            });

            function nextTurn() {
                db.ref(`rooms/${selectedRoom}/gameSession`).once('value').then(snapshot => {
                    let sess = snapshot.val();
                    if(!sess || sess.status !== 'playing') return;
                    let nRound = sess.round + 1;
                    
                    if(nRound > sess.maxRound) {
                        db.ref(`rooms/${selectedRoom}/gameSession`).update({ status: 'ended' });
                        db.ref(`rooms/${selectedRoom}/chat`).push({ sender: '시스템', msg: '🏆 8턴 종료! 시상식을 진행합니다.', type: 'sys' });
                        
                        setTimeout(() => {
                            if(isHost) {
                                db.ref(`rooms/${selectedRoom}/gameSession`).update({ status: 'waiting' });
                                db.ref(`rooms/${selectedRoom}/draw`).remove();
                            }
                            document.getElementById('podiumModal').style.display = 'none';
                        }, 5000);
                        return;
                    }

                    db.ref(`rooms/${selectedRoom}/players`).once('value').then(pSnap => {
                        let pObj = pSnap.val();
                        let validPlayers = Object.keys(pObj).filter(n => pObj[n].role !== 'spectator');
                        let avail = validPlayers.filter(n => n !== sess.drawer);
                        if(avail.length === 0) avail = validPlayers;

                        let nDrawer = avail[Math.floor(Math.random() * avail.length)];
                        let wList = themeWords[sess.theme] || themeWords["게임캐릭터"];
                        let nWord = wList[Math.floor(Math.random() * wList.length)];

                        db.ref(`rooms/${selectedRoom}/gameSession`).set({ round: nRound, maxRound: 8, status: 'playing', drawer: nDrawer, word: nWord, theme: sess.theme });
                        db.ref(`rooms/${selectedRoom}/draw`).remove();
                        db.ref(`rooms/${selectedRoom}/chat`).push({ sender: '시스템', msg: `[제 ${nRound}턴] 출제자: ${nDrawer}`, type: 'sys' });
                        playStartSound();
                    });
                });
            }

            let currentDrawerGlobal = "";
            db.ref(`rooms/${selectedRoom}/gameSession`).on('value', (snapshot) => {
                let sess = snapshot.val();
                if(!sess) return;
                
                if(sess.status === 'waiting') {
                    wordDisplay.textContent = "방장의 게임 시작 대기 중...";
                    timerBadge.textContent = "대기";
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    isMyTurn = false;
                    document.getElementById('btnPass').style.display = 'none';
                    if(isHost) document.getElementById('startBtn').style.display = 'block';
                    if(timerInterval) clearInterval(timerInterval);
                    return;
                }

                if(sess.status === 'ended') {
                    wordDisplay.textContent = "게임 종료!";
                    timerBadge.textContent = "종료";
                    isMyTurn = false;
                    document.getElementById('btnPass').style.display = 'none';
                    document.getElementById('startBtn').style.display = 'none';
                    if(timerInterval) clearInterval(timerInterval);
                    
                    db.ref(`rooms/${selectedRoom}/players`).once('value').then(pSnap => {
                        showPodium(pSnap.val());
                    });
                    return;
                }

                document.getElementById('startBtn').style.display = 'none';
                currentWord = sess.word;
                currentDrawerGlobal = sess.drawer;
                ctx.clearRect(0, 0, canvas.width, canvas.height);

                db.ref(`rooms/${selectedRoom}/players`).once('value').then(pSnap => {
                    let pObj = pSnap.val();
                    if(pObj && !pObj[currentDrawerGlobal]) {
                        db.ref(`rooms/${selectedRoom}/chat`).push({ sender: '시스템', msg: `⚠️ 출제자 나감! 다음 턴 이동.`, type: 'sys' });
                        if(isHost || myName === Object.keys(pObj)[0]) nextTurn();
                    }
                });

                if(sess.drawer === myName) {
                    isMyTurn = true;
                    document.getElementById('btnPass').style.display = 'inline-block';
                    wordDisplay.textContent = `제시어: [ ${currentWord} ] (그리는 중)`;
                } else {
                    isMyTurn = false;
                    document.getElementById('btnPass').style.display = 'none';
                    let bl = "⭐".repeat(currentWord.length);
                    wordDisplay.textContent = `제시어: ${bl} (출제: ${sess.drawer})`;
                }

                if(timerInterval) clearInterval(timerInterval);
                let left = 30;
                timerBadge.textContent = `${left}초`;

                timerInterval = setInterval(() => {
                    left--;
                    timerBadge.textContent = `${left}초`;
                    
                    if(left === 15 && isMyTurn) {
                        db.ref(`rooms/${selectedRoom}/chat`).push({ sender: '시스템', msg: `💡 힌트: ${getChosung(currentWord)}`, type: 'hint' });
                    }

                    if(left <= 0) {
                        clearInterval(timerInterval);
                        if(isHost) nextTurn();
                    }
                }, 1000);
            });

            db.ref(`rooms/${selectedRoom}/players`).on('value', (snapshot) => {
                document.getElementById('leftProfiles').innerHTML = '';
                document.getElementById('rightProfiles').innerHTML = '';
                let arr = [];
                snapshot.forEach(child => {
                    arr.push({ name: child.key, score: child.val().score, avatar: child.val().avatar, role: child.val().role, host: child.val().host, ready: child.val().ready });
                });
                arr.sort((a,b) => b.score - a.score);

                for(let i = 0; i < 4; i++) document.getElementById('leftProfiles').appendChild(createProfileCard(arr[i], currentDrawerGlobal));
                for(let i = 4; i < 8; i++) document.getElementById('rightProfiles').appendChild(createProfileCard(arr[i], currentDrawerGlobal));
            });
        }

        function createProfileCard(pData, drawerName) {
            let card = document.createElement('div');
            card.className = 'profile-card';
            if(pData) {
                if(pData.name === drawerName) card.classList.add('active-drawer');
                if(pData.role === 'spectator') card.classList.add('spectator');
                
                let badge = '';
                if(pData.host) badge = `<div class="role-badge host">👑 방장</div>`;
                else if(pData.role === 'spectator') badge = `<div class="role-badge spec">👀 관전</div>`;

                let readyTag = '';
                if(!pData.host && pData.role !== 'spectator') {
                    readyTag = pData.ready ? `<div class="ready-badge on">READY</div>` : `<div class="ready-badge off">WAIT</div>`;
                }

                card.innerHTML = `${badge}${readyTag}<div class="profile-avatar">${pData.avatar}</div><div class="profile-name">${pData.name}</div><div class="profile-score">${pData.score}점</div>`;
            } else {
                card.innerHTML = `<div class="profile-avatar" style="opacity:0.2;">👤</div><div class="profile-name" style="color:#bdc3c7;">비어있음</div><div class="profile-score">-</div>`;
            }
            return card;
        }

        function showPodium(playersObj) {
            let arr = [];
            for(let key in playersObj) {
                if(playersObj[key].role !== 'spectator') arr.push({name: key, score: playersObj[key].score, avatar: playersObj[key].avatar});
            }
            arr.sort((a,b) => b.score - a.score);

            let first = arr[0] || {name: '-', score: 0, avatar: '👤'};
            let second = arr[1] || {name: '-', score: 0, avatar: '👤'};
            let third = arr[2] || {name: '-', score: 0, avatar: '👤'};

            document.getElementById('podiumContainer').innerHTML = `
                <div class="podium-step">
                    <div class="podium-avatar">${second.avatar}</div>
                    <div class="podium-name">${second.name} (${second.score}점)</div>
                    <div class="podium-box second">2등</div>
                </div>
                <div class="podium-step" style="margin-bottom:20px;">
                    <div class="podium-avatar" style="font-size:50px;">${first.avatar}</div>
                    <div class="podium-name" style="color:#f1c40f;">${first.name} (${first.score}점)</div>
                    <div class="podium-box first">👑 1등</div>
                </div>
                <div class="podium-step">
                    <div class="podium-avatar">${third.avatar}</div>
                    <div class="podium-name">${third.name} (${third.score}점)</div>
                    <div class="podium-box third">3등</div>
                </div>
            `;
            document.getElementById('podiumModal').style.display = 'flex';
        }

        window.addEventListener('beforeunload', () => {
            if(myName && selectedRoom) db.ref(`rooms/${selectedRoom}/players/${myName}`).remove();
        });
    </script>
</body>
</html>
