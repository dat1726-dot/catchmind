<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>캐치마인드 - 공평한 턴 배정</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Malgun Gothic', sans-serif; }
        body { background-color: #eef2f5; color: #333; height: 100vh; display: flex; justify-content: center; align-items: center; overflow: hidden; }

        /* 로비 화면 */
        #lobbyContainer {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            width: 400px;
            text-align: center;
            border: 3px solid #4a90e2;
        }
        #lobbyContainer h1 { font-size: 26px; color: #2c3e50; margin-bottom: 5px; }
        #lobbyContainer p { color: #7f8c8d; font-size: 13px; margin-bottom: 15px; }
        
        .input-group { margin-bottom: 12px; text-align: left; }
        .input-group label { display: block; font-size: 12px; font-weight: bold; color: #34495e; margin-bottom: 4px; }
        .input-group input { width: 100%; padding: 8px 10px; border: 2px solid #bdc3c7; border-radius: 6px; font-size: 14px; outline: none; }
        .input-group input:focus { border-color: #4a90e2; }

        .avatar-grid { display: flex; justify-content: space-around; margin-bottom: 15px; }
        .avatar-option { font-size: 24px; padding: 6px; cursor: pointer; border: 2px solid #bdc3c7; border-radius: 50%; width: 42px; height: 42px; display: flex; align-items: center; justify-content: center; background: #ecf0f1; }
        .avatar-option.selected { border-color: #e74c3c; background: #fadbd8; transform: scale(1.1); }

        .room-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 12px; }
        .room-btn { padding: 10px 4px; background: #ecf0f1; border: 2px solid #bdc3c7; border-radius: 6px; font-weight: bold; cursor: pointer; color: #2c3e50; font-size: 13px; }
        .room-btn:hover { background: #dcdde1; }
        .room-btn.active { background: #4a90e2; color: white; border-color: #357abd; }

        .custom-room-box { display: flex; gap: 6px; margin-bottom: 15px; }
        .custom-room-box input { flex-grow: 1; padding: 8px; border: 2px solid #bdc3c7; border-radius: 6px; }
        
        .btn-enter { width: 100%; padding: 12px; background: #2ecc71; color: white; border: none; border-radius: 6px; font-size: 16px; font-weight: bold; cursor: pointer; box-shadow: 0 3px #27ae60; }
        .btn-enter:active { transform: translateY(2px); box-shadow: 0 1px #27ae60; }

        /* 게임 메인 화면 */
        .game-container { display: none; width: 1000px; max-width: 98vw; height: 640px; background: #d7effb; border: 4px solid #2980b9; border-radius: 8px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); gap: 10px; padding: 10px; }
        
        .left-pane { display: flex; flex-direction: column; width: 620px; gap: 8px; }
        .top-info-bar { display: flex; justify-content: space-between; align-items: center; background: #fff; padding: 8px 12px; border: 2px solid #2980b9; border-radius: 6px; font-weight: bold; }
        .word-quiz-box { font-size: 18px; color: #c0392b; letter-spacing: 1px; }
        .timer-box { font-size: 15px; color: #e67e22; background: #fef5e7; padding: 3px 10px; border-radius: 15px; border: 1px solid #f39c12; }

        .canvas-wrap { position: relative; background: white; border: 3px solid #2980b9; border-radius: 6px; overflow: hidden; }
        canvas { display: block; cursor: crosshair; background: #fff; }

        .palette-bar { display: flex; align-items: center; background: #fff; padding: 6px 10px; border: 2px solid #2980b9; border-radius: 6px; justify-content: space-between; }
        .colors { display: flex; gap: 4px; }
        .c-btn { width: 22px; height: 22px; border-radius: 3px; cursor: pointer; border: 1px solid #7f8c8d; }
        .tools-group { display: flex; gap: 5px; }
        .t-btn { padding: 4px 10px; font-size: 12px; font-weight: bold; background: #ecf0f1; border: 1px solid #bdc3c7; border-radius: 4px; cursor: pointer; }
        .t-btn:hover { background: #bdc3c7; }

        .right-pane { display: flex; flex-direction: column; flex-grow: 1; gap: 8px; }
        .score-board { background: #fff; border: 2px solid #2980b9; border-radius: 6px; height: 160px; padding: 8px; overflow-y: auto; }
        .score-board h3 { font-size: 13px; color: #2c3e50; border-bottom: 2px solid #ecf0f1; padding-bottom: 4px; margin-bottom: 6px; }
        .player-row { display: flex; justify-content: space-between; align-items: center; font-size: 13px; padding: 4px 6px; border-bottom: 1px dashed #ecf0f1; }
        .player-row.me { background: #ebf5fb; font-weight: bold; color: #2980b9; }

        .action-panel { display: flex; gap: 5px; }
        .btn-game-start { flex-grow: 1; padding: 8px; background: #e74c3c; color: white; border: none; border-radius: 6px; font-weight: bold; font-size: 14px; cursor: pointer; box-shadow: 0 2px #c0392b; }
        .btn-game-start:active { transform: translateY(1px); box-shadow: none; }

        .chat-container { display: flex; flex-direction: column; flex-grow: 1; background: #fff; border: 2px solid #2980b9; border-radius: 6px; overflow: hidden; }
        .chat-messages { flex-grow: 1; overflow-y: auto; padding: 8px; font-size: 12px; display: flex; flex-direction: column; gap: 4px; background: #fdfefe; }
        .chat-input-row { display: flex; border-top: 2px solid #2980b9; }
        .chat-input-row input { flex-grow: 1; padding: 8px; border: none; outline: none; font-size: 13px; }
        .chat-input-row button { padding: 0 12px; background: #3498db; color: white; border: none; font-weight: bold; cursor: pointer; }
        .chat-input-row button:hover { background: #2980b9; }

        .m-sys { color: #c0392b; font-weight: bold; background: #fadbd8; padding: 3px 6px; border-radius: 3px; }
        .m-correct { color: #27ae60; font-weight: bold; background: #d4efdf; padding: 4px 6px; border-radius: 3px; border-left: 3px solid #27ae60; }
        .m-chat { color: #2c3e50; background: #f2f4f4; padding: 3px 6px; border-radius: 3px; }
        .m-chat span { color: #2980b9; font-weight: bold; }
    </style>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
</head>
<body>

    <!-- 로비 화면 -->
    <div id="lobbyContainer">
        <h1>캐치마인드</h1>
        <p>프로필 & 실시간 방 인원수 확인</p>
        
        <div class="input-group">
            <label>아바타 선택</label>
            <div class="avatar-grid">
                <div class="avatar-option selected" onclick="selectAvatar('🐶', this)">🐶</div>
                <div class="avatar-option" onclick="selectAvatar('🐱', this)">🐱</div>
                <div class="avatar-option" onclick="selectAvatar('🦊', this)">🦊</div>
                <div class="avatar-option" onclick="selectAvatar('🐼', this)">🐼</div>
            </div>
        </div>

        <div class="input-group">
            <label>닉네임</label>
            <input type="text" id="nicknameInput" placeholder="닉네임을 입력하세요" maxlength="8">
        </div>

        <div class="input-group">
            <label>방 선택 (실시간 인원 표시)</label>
            <div class="room-grid">
                <button class="room-btn active" id="btn_1번방" onclick="selectRoom('1번방', this)">1번방 (0명)</button>
                <button class="room-btn" id="btn_2번방" onclick="selectRoom('2번방', this)">2번방 (0명)</button>
                <button class="room-btn" id="btn_3번방" onclick="selectRoom('3번방', this)">3번방 (0명)</button>
            </div>
        </div>

        <div class="custom-room-box">
            <input type="text" id="customRoomInput" placeholder="기타 방 번호">
            <button class="t-btn" onclick="joinCustomRoom()" style="background:#bdc3c7;">입장</button>
        </div>

        <button class="btn-enter" onclick="enterGame()">게임 입장</button>
    </div>

    <!-- 게임 메인 화면 -->
    <div class="game-container" id="gameArea">
        <div class="left-pane">
            <div class="top-info-bar">
                <div class="room-badge-txt" id="roomTitleTxt" style="color:#2980b9;">[1번방]</div>
                <div class="word-quiz-box" id="wordDisplay">대기 중...</div>
                <div class="timer-box" id="timerBadge">30초</div>
            </div>

            <div class="canvas-wrap">
                <canvas id="drawingBoard" width="580" height="420"></canvas>
            </div>

            <div class="palette-bar">
                <div class="colors">
                    <div class="c-btn" style="background:#000000;" onclick="setColor('#000000')"></div>
                    <div class="c-btn" style="background:#ffffff; border:1px solid #7f8c8d;" onclick="setColor('#ffffff')"></div>
                    <div class="c-btn" style="background:#e74c3c;" onclick="setColor('#e74c3c')"></div>
                    <div class="c-btn" style="background:#3498db;" onclick="setColor('#3498db')"></div>
                    <div class="c-btn" style="background:#2ecc71;" onclick="setColor('#2ecc71')"></div>
                    <div class="c-btn" style="background:#f1c40f;" onclick="setColor('#f1c40f')"></div>
                    <div class="c-btn" style="background:#9b59b6;" onclick="setColor('#9b59b6')"></div>
                    <div class="c-btn" style="background:#e67e22;" onclick="setColor('#e67e22')"></div>
                </div>
                <div class="tools-group">
                    <button class="t-btn" id="clearBtn">전체삭제</button>
                </div>
            </div>
        </div>

        <div class="right-pane">
            <div class="score-board">
                <h3>🏆 실시간 순위 (8턴 진행)</h3>
                <div id="playersContainer"></div>
            </div>

            <div class="action-panel">
                <button class="btn-game-start" id="startBtn">게임 시작</button>
            </div>

            <div class="chat-container">
                <div class="chat-messages" id="chatBox"></div>
                <div class="chat-input-row">
                    <input type="text" id="chatInput" placeholder="정답 또는 채팅 입력...">
                    <button id="sendBtn">전송</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const wordList = [
            "사과", "바나나", "호랑이", "컴퓨터", "스마트폰", "피자", "비행기", "우주선", "외계인", "경찰차",
            "소방관", "간호사", "의사", "학교", "선생님", "연필", "지우개", "가방", "안경", "시계",
            "자전거", "오토바이", "기차", "배", "구름", "태양", "달", "별", "무지개", "우산"
        ];

        const firebaseConfig = {
            apiKey: "AIzaSyBc51nfquy9i1FfCV0OZPdF0VBlX_ymVb0",
            authDomain: "catchmind-game-65e32.firebaseapp.com",
            projectId: "catchmind-game-65e32",
            storageBucket: "catchmind-game-65e32.firebasestorage.app",
            messagingSenderId: "813723811545",
            appId: "1:813723811545:web:0e467f03a5607702c6c8c8",
            databaseURL: "https://catchmind-game-65e32-default-rtdb.firebaseio.com"
        };
        
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let selectedRoom = "1번방";
        let myName = "";
        let myAvatar = "🐶";
        let myScore = 0;
        let isMyTurn = false;
        let currentWord = "";
        let timerInterval = null;
        let drawColor = "#000000";

        const canvas = document.getElementById('drawingBoard');
        const ctx = canvas.getContext('2d');
        const chatBox = document.getElementById('chatBox');
        const chatInput = document.getElementById('chatInput');
        const wordDisplay = document.getElementById('wordDisplay');
        const playersContainer = document.getElementById('playersContainer');
        const timerBadge = document.getElementById('timerBadge');

        ['1번방', '2번방', '3번방'].forEach(r => {
            db.ref(`rooms/${r}/players`).on('value', snapshot => {
                let count = snapshot.numChildren();
                let btn = document.getElementById(`btn_${r}`);
                if(btn) btn.textContent = `${r} (${count}명)`;
            });
        });

        function selectAvatar(avatar, el) {
            myAvatar = avatar;
            document.querySelectorAll('.avatar-option').forEach(a => a.classList.remove('selected'));
            el.classList.add('selected');
        }

        function selectRoom(rName, btn) {
            selectedRoom = rName;
            document.querySelectorAll('.room-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        }

        function joinCustomRoom() {
            let val = document.getElementById('customRoomInput').value.trim();
            if(val) {
                selectedRoom = val;
                enterGame();
            } else {
                alert("방 번호를 입력하세요!");
            }
        }

        function enterGame() {
            let n = document.getElementById('nicknameInput').value.trim();
            if(!n) {
                alert("닉네임을 입력해주세요!");
                return;
            }
            myName = n;
            document.getElementById('lobbyContainer').style.display = 'none';
            document.getElementById('gameArea').style.display = 'flex';
            document.getElementById('roomTitleTxt').textContent = `[${selectedRoom}]`;

            db.ref(`rooms/${selectedRoom}/players/${myName}`).set({ score: 0, avatar: myAvatar });
            initClassicEngine();
        }

        function setColor(c) {
            drawColor = c;
            ctx.strokeStyle = c;
        }

        function initClassicEngine() {
            ctx.lineWidth = 4;
            ctx.lineCap = "round";
            ctx.lineJoin = "round";
            ctx.strokeStyle = drawColor;

            let drawing = false;
            canvas.addEventListener('mousedown', (e) => {
                if(!isMyTurn) return;
                drawing = true;
                ctx.beginPath();
                ctx.moveTo(e.offsetX, e.offsetY);
            });
            canvas.addEventListener('mousemove', (e) => {
                if(!drawing || !isMyTurn) return;
                ctx.lineTo(e.offsetX, e.offsetY);
                ctx.stroke();
                db.ref(`rooms/${selectedRoom}/draw`).push({ x: e.offsetX, y: e.offsetY, color: drawColor, type: 'line' });
            });
            canvas.addEventListener('mouseup', () => {
                if(!isMyTurn) return;
                drawing = false;
                db.ref(`rooms/${selectedRoom}/draw`).push({ type: 'end' });
            });
            canvas.addEventListener('mouseout', () => { drawing = false; });

            document.getElementById('clearBtn').onclick = () => {
                if(!isMyTurn) return;
                ctx.clearRect(0,0,canvas.width,canvas.height);
                db.ref(`rooms/${selectedRoom}/draw`).push({ type: 'clear' });
            };

            db.ref(`rooms/${selectedRoom}/draw`).on('child_added', (snapshot) => {
                let data = snapshot.val();
                if(!data) return;
                if(data.type === 'line') {
                    ctx.strokeStyle = data.color || '#000';
                    ctx.lineTo(data.x, data.y);
                    ctx.stroke();
                } else if(data.type === 'end') {
                    ctx.beginPath();
                } else if(data.type === 'clear') {
                    ctx.clearRect(0,0,canvas.width,canvas.height);
                    ctx.beginPath();
                }
            });

            document.getElementById('startBtn').onclick = () => {
                db.ref(`rooms/${selectedRoom}/players`).once('value').then(snapshot => {
                    let pObj = snapshot.val();
                    if(!pObj) return;
                    let pNames = Object.keys(pObj);
                    let firstDrawer = pNames[0];
                    let firstWord = wordList[Math.floor(Math.random() * wordList.length)];

                    db.ref(`rooms/${selectedRoom}/gameSession`).set({
                        round: 1, maxRound: 8, status: 'playing', drawer: firstDrawer, word: firstWord
                    });
                    db.ref(`rooms/${selectedRoom}/draw`).remove();
                    db.ref(`rooms/${selectedRoom}/chat`).push({ sender: '시스템', msg: '게임이 시작되었습니다! 총 8턴 진행!', type: 'sys' });
                });
            };

            document.getElementById('sendBtn').onclick = sendMsg;
            chatInput.onkeypress = (e) => { if(e.key === 'Enter') sendMsg(); };

            function sendMsg() {
                let text = chatInput.value.trim();
                if(!text) return;

                if(text === currentWord && !isMyTurn) {
                    db.ref(`rooms/${selectedRoom}/chat`).push({ sender: '시스템', msg: `정답입니다! [${myName}] 득점! (+10)`, type: 'correct' });
                    myScore += 10;
                    db.ref(`rooms/${selectedRoom}/players/${myName}`).update({ score: myScore });
                    nextTurn();
                } else {
                    db.ref(`rooms/${selectedRoom}/chat`).push({ sender: myName, msg: text, type: 'chat' });
                }
                chatInput.value = '';
            }

            db.ref(`rooms/${selectedRoom}/chat`).on('child_added', (snapshot) => {
                let d = snapshot.val();
                if(!d) return;
                let div = document.createElement('div');
                if(d.type === 'sys') {
                    div.className = 'm-sys'; div.textContent = `[공지] ${d.msg}`;
                } else if(d.type === 'correct') {
                    div.className = 'm-correct'; div.textContent = d.msg;
                } else {
                    div.className = 'm-chat'; div.innerHTML = `<span>${d.sender}:</span> ${d.msg}`;
                }
                chatBox.appendChild(div);
                chatBox.scrollTop = chatBox.scrollHeight;
            });

            // 모든 인원에게 공평하게 턴이 돌아가도록 수정된 함수
            function nextTurn() {
                db.ref(`rooms/${selectedRoom}/gameSession`).once('value').then(snapshot => {
                    let sess = snapshot.val();
                    if(!sess || sess.status !== 'playing') return;
                    let nRound = sess.round + 1;
                    if(nRound > sess.maxRound) {
                        db.ref(`rooms/${selectedRoom}/gameSession`).update({ status: 'ended' });
                        db.ref(`rooms/${selectedRoom}/chat`).push({ sender: '시스템', msg: '8턴 게임 종료! 순위를 확인하세요.', type: 'sys' });
                        return;
                    }

                    db.ref(`rooms/${selectedRoom}/players`).once('value').then(pSnap => {
                        let pObj = pSnap.val();
                        if(!pObj) return;
                        let pNames = Object.keys(pObj);
                        let currentDrawer = sess.drawer;

                        // 직전 출제자를 제외한 나머지 인원들 필터링 (혼자라면 어쩔 수 없이 그 사람이 다시)
                        let availableDrawers = pNames.filter(name => name !== currentDrawer);
                        if(availableDrawers.length === 0) {
                            availableDrawers = pNames;
                        }

                        // 남은 인원 중 무작위로 다음 출제자 선정
                        let nDrawer = availableDrawers[Math.floor(Math.random() * availableDrawers.length)];
                        let nWord = wordList[Math.floor(Math.random() * wordList.length)];

                        db.ref(`rooms/${selectedRoom}/gameSession`).set({
                            round: nRound, maxRound: 8, status: 'playing', drawer: nDrawer, word: nWord
                        });
                        db.ref(`rooms/${selectedRoom}/draw`).remove();
                        db.ref(`rooms/${selectedRoom}/chat`).push({ sender: '시스템', msg: `[제 ${nRound}턴] 출제자: ${nDrawer}`, type: 'sys' });
                    });
                });
            }

            db.ref(`rooms/${selectedRoom}/gameSession`).on('value', (snapshot) => {
                let sess = snapshot.val();
                if(!sess) return;
                if(sess.status === 'waiting') {
                    wordDisplay.textContent = "대기실 (시작 버튼 클릭)";
                    timerBadge.textContent = "대기";
                    return;
                }
                if(sess.status === 'ended') {
                    wordDisplay.textContent = "게임 종료!";
                    timerBadge.textContent = "종료";
                    isMyTurn = false;
                    return;
                }

                currentWord = sess.word;
                ctx.clearRect(0, 0, canvas.width, canvas.height);

                if(sess.drawer === myName) {
                    isMyTurn = true;
                    wordDisplay.textContent = `제시어: [ ${currentWord} ] (그리는 중)`;
                } else {
                    isMyTurn = false;
                    let bl = "⭐".repeat(currentWord.length);
                    wordDisplay.textContent = `제시어: ${bl} (출제자: ${sess.drawer})`;
                }

                if(timerInterval) clearInterval(timerInterval);
                let left = 30;
                timerBadge.textContent = `${left}초`;

                timerInterval = setInterval(() => {
                    left--;
                    timerBadge.textContent = `${left}초`;
                    if(left <= 0) {
                        clearInterval(timerInterval);
                        db.ref(`rooms/${selectedRoom}/players`).once('value').then(pSnap => {
                            let fPlayer = Object.keys(pSnap.val())[0];
                            if(myName === fPlayer) nextTurn();
                        });
                    }
                }, 1000);
            });

            db.ref(`rooms/${selectedRoom}/players`).on('value', (snapshot) => {
                playersContainer.innerHTML = '';
                let arr = [];
                snapshot.forEach(child => {
                    arr.push({ name: child.key, score: child.val().score, avatar: child.val().avatar || '🐶' });
                });
                arr.sort((a,b) => b.score - a.score);

                arr.forEach((p, idx) => {
                    let div = document.createElement('div');
                    div.className = `player-row ${p.name === myName ? 'me' : ''}`;
                    div.innerHTML = `<span>${idx+1}등. ${p.avatar} ${p.name}</span> <strong>${p.score}점</strong>`;
                    playersContainer.appendChild(div);
                });
            });
        }

        window.addEventListener('beforeunload', () => {
            if(myName && selectedRoom) {
                db.ref(`rooms/${selectedRoom}/players/${myName}`).remove();
            }
        });
    </script>
</body>
</html>
